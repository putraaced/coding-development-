<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library Booking - Booking Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">Library Booking</a>
            <div class="collapse navbar-collapse justify-content-end">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="booking.html">Booking Form</a></li>
                    <li class="nav-item"><a class="nav-link" href="book.html">Book</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="mb-4">Booking Form</h2>
        <div class="card p-4 shadow-sm border-0">
            
            <form id="bookingForm" novalidate>
                <div class="mb-3">
                    <input type="text" id="name" class="form-control" placeholder="Student Name" required>
                </div>
                <div class="mb-3">
                    <input type="email" id="email" class="form-control" placeholder="Email" required>
                </div>
                <div class="mb-3">
                    <input type="date" id="date" class="form-control" required>
                </div>
                <div class="mb-3">
                    <select class="form-select" id="book" required>
                        <option value="">Select Book</option>
                        <option>Learn Html Coding For Beginners</option>
                        <option>Beginner's Guide to Programming Code with JavaScript</option>
                        <option>Web Style Guide</option>
                        <option>Bootstrap for Responsive Web Design</option>
                    </select>
                </div>
                <button id="reserveButton" type="submit" class="btn btn-success w-100">Reserve</button>
            </form>
        </div>

        <div id="successAlert" class="alert alert-success mt-4 d-none">
            Booking Successful!
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const bookingForm = document.getElementById('bookingForm');
            const successAlert = document.getElementById('successAlert');
            if (!bookingForm) {
                console.error('Booking form not found');
                return;
            }

            bookingForm.addEventListener('submit', function(event) {
                event.preventDefault();
                event.stopPropagation();

                console.log('Booking form submitted');

                if (this.checkValidity()) {
                    successAlert.classList.remove('d-none');
                    alert('Booking Successful!');
                    this.reset();
                } else {
                    alert('Please complete all fields correctly before submitting.');
                }

                this.classList.add('was-validated');
            });
        });
    </script>
</body>
</html>
