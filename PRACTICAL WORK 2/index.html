<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Booking</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">Library Booking</a>
            <div class="collapse navbar-collapse justify-content-end">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="booking.html">Booking Form</a></li>
                    <li class="nav-item"><a class="nav-link" href="book.html">Book</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row align-items-center">
            
            <div class="col-md-7">
                <h1 class="display-4">Welcome to Library Book Booking System</h1>
            </div>
            
            <div class="col-md-5">
                <div class="card p-4 shadow-sm border-0">
                    <h3 class="text-center mb-3">Login</h3>
                    <form>
                        <div class="mb-3">
                            <input type="text" class="form-control" placeholder="Username" required>
                        </div>
                        <div class="mb-3">
                            <input type="password" class="form-control" placeholder="Password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>
                </div>
            </div>
        </div>

        
        <div id="libCarousel" class="carousel slide mt-5 shadow rounded overflow-hidden" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active"><img src="pw2wd/Bootstrap.jpeg" class="d-block w-100" alt="Book 1"></div>
                <div class="carousel-item"><img src="pw2wd/JavaScr.jpeg" class="d-block w-100" alt="Book 2"></div>
                <div class="carousel-item"><img src="pw2wd/CSS.jpeg" class="d-block w-100" alt="Book 3"></div>
                <div class="carousel-item"><img src="pw2wd/Html.jpeg" class="d-block w-100" alt="Book 4"></div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#libCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#libCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
        </div>
    </div>

    <footer>Library Booking System &copy; 2026</footer>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
